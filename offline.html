<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex">
<meta name="theme-color" content="#070a0f">
<title>Offline — RT Image Matching Trainer</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<style>
  html,body{height:100%;margin:0}
  body{background:#070a0f;color:#eaf1f8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Inter,system-ui,sans-serif;-webkit-font-smoothing:antialiased;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px}
  .card{max-width:440px}
  .dot{width:14px;height:14px;border-radius:50%;background:linear-gradient(135deg,#2dd4ee,#ff7a45);display:inline-block;margin-right:9px;vertical-align:middle}
  .brand{font-weight:700}
  h1{font-size:22px;margin:16px 0 8px;letter-spacing:-.2px}
  p{color:#9fadbd;line-height:1.6;font-size:15px;margin:8px 0}
  a{display:inline-block;margin-top:10px;color:#070a0f;background:#2dd4ee;padding:9px 18px;border-radius:8px;font-weight:600;text-decoration:none}
</style>
</head>
<body>
  <main class="card">
    <div><span class="dot"></span><span class="brand">RT Image Matching Trainer</span></div>
    <h1>You're offline</h1>
    <p>This needs an internet connection. The trainer streams its imaging cases on demand, so reconnect and try again.</p>
    <a href="/" onclick="location.reload();return false;">Retry</a>
  </main>
</body>
</html>
