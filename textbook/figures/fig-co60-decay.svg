<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 320" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="560" height="320" fill="white"/>
<text x="280" y="28" text-anchor="middle" font-size="17" font-weight="bold" fill="#0e3a4f">Cobalt-60 Decay Scheme</text>
<line x1="70" y1="70" x2="230" y2="70" stroke="#0e3a4f" stroke-width="3"/>
<text x="70" y="60" font-size="14" fill="#0e3a4f">⁶⁰Co  (half-life 5.27 yr)</text>
<line x1="300" y1="135" x2="490" y2="135" stroke="#1f7fa0" stroke-width="3"/>
<text x="300" y="125" font-size="13" fill="#1f7fa0">⁶⁰Ni* (excited)</text>
<!-- beta arrow -->
<line x1="150" y1="70" x2="360" y2="133" stroke="#2e8b57" stroke-width="2.5"/>
<polygon points="360,133 348,124 350,136" fill="#2e8b57"/>
<text x="232" y="108" font-size="13" fill="#2e8b57">β⁻  (~0.31 MeV)</text>
<line x1="300" y1="205" x2="490" y2="205" stroke="#1f7fa0" stroke-width="3"/>
<!-- gamma 1 -->
<line x1="395" y1="135" x2="395" y2="203" stroke="#d98a1f" stroke-width="2.5"/>
<polygon points="395,203 389,190 401,190" fill="#d98a1f"/>
<text x="405" y="175" font-size="14" fill="#d98a1f">γ₁ = 1.17 MeV</text>
<line x1="300" y1="275" x2="490" y2="275" stroke="#0e3a4f" stroke-width="3"/>
<text x="300" y="297" font-size="13" fill="#0e3a4f">⁶⁰Ni (stable)</text>
<!-- gamma 2 -->
<line x1="395" y1="205" x2="395" y2="273" stroke="#d98a1f" stroke-width="2.5"/>
<polygon points="395,273 389,260 401,260" fill="#d98a1f"/>
<text x="405" y="245" font-size="14" fill="#d98a1f">γ₂ = 1.33 MeV</text>
</svg>