<path d="M75,70 L360,70 C400,70 415,120 430,200 C438,240 445,262 470,265" stroke="#1f7fa0" stroke-width="3" fill="none"/>
<text x="150" y="62" font-size="11" fill="#1f7fa0">target (want a sharp cliff near Rx)</text>
<!-- OAR: drops early/left -->
<path d="M75,70 C120,120 160,200 220,245 C260,262 300,265 340,265" stroke="#c0392b" stroke-width="3" fill="none"/>
