<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 320" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="580" height="320" fill="white"/>
<text x="290" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0e3a4f">Reading a Dose-Volume Histogram (DVH)</text>
<line x1="75" y1="265" x2="540" y2="265" stroke="#1b2733" stroke-width="1.5"/>
<line x1="75" y1="265" x2="75" y2="55" stroke="#1b2733" stroke-width="1.5"/>
