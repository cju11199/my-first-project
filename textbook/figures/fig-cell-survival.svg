<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 330" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="580" height="330" fill="white"/>
<text x="290" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0e3a4f">Cell Survival Curve (Linear-Quadratic)</text>
<line x1="80" y1="280" x2="540" y2="280" stroke="#1b2733" stroke-width="1.5"/>
<line x1="80" y1="280" x2="80" y2="55" stroke="#1b2733" stroke-width="1.5"/>
<text x="310" y="312" text-anchor="middle" font-size="13" fill="#1b2733">Dose (Gy)  →</text>
<text x="40" y="170" text-anchor="middle" font-size="12" fill="#1b2733" transform="rotate(-90 40 170)">Surviving fraction (log) →</text>
<text x="52" y="72" font-size="10" fill="#7a8794">1</text>
<text x="44" y="170" font-size="10" fill="#7a8794">0.1</text>
<text x="36" y="268" font-size="10" fill="#7a8794">0.01</text>
<!-- low-LET curve: shoulder then bend -->
<path d="M80,70 C150,78 200,100 260,150 C320,200 400,255 520,278" stroke="#1f7fa0" stroke-width="3" fill="none"/>
<text x="300" y="150" font-size="12" fill="#1f7fa0">low-LET (x-rays): shoulder</text>
<!-- high-LET: straight steep -->
<path d="M80,70 L300,278" stroke="#c0392b" stroke-width="2.5" fill="none" stroke-dasharray="6 4"/>
<text x="150" y="250" font-size="12" fill="#c0392b">high-LET: straighter, steeper</text>
<text x="120" y="100" font-size="11" fill="#7a8794">shoulder = repair of</text>
<text x="120" y="115" font-size="11" fill="#7a8794">sublethal damage</text>
</svg>