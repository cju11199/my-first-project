<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 360" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="580" height="360" fill="white"/>
<text x="290" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0e3a4f">Which interaction dominates?</text>
<line x1="70" y1="300" x2="540" y2="300" stroke="#1b2733" stroke-width="1.5"/>
<line x1="70" y1="300" x2="70" y2="55" stroke="#1b2733" stroke-width="1.5"/>
<text x="305" y="335" text-anchor="middle" font-size="13" fill="#1b2733">Photon energy  →  (0.01 → 100 MeV, log scale)</text>
<text x="34" y="180" text-anchor="middle" font-size="13" fill="#1b2733" transform="rotate(-90 34 180)">Atomic number Z →</text>
<!-- left curve: PE = Compton -->
<path d="M120,300 C150,200 175,120 220,60" stroke="#1f7fa0" stroke-width="2.5" fill="none"/>
<!-- right curve: Compton = Pair -->
<path d="M360,300 C400,200 430,120 480,60" stroke="#d98a1f" stroke-width="2.5" fill="none"/>
<text x="95" y="120" font-size="14" font-weight="bold" fill="#1f7fa0">Photoelectric</text>
<text x="100" y="138" font-size="11" fill="#7a8794">(low E, high Z)</text>
<text x="250" y="250" font-size="14" font-weight="bold" fill="#c0392b">Compton</text>
<text x="232" y="268" font-size="11" fill="#7a8794">(the megavoltage therapy band)</text>
<text x="470" y="150" font-size="14" font-weight="bold" fill="#d98a1f">Pair</text>
<text x="455" y="168" font-size="14" font-weight="bold" fill="#d98a1f">production</text>
<text x="452" y="186" font-size="11" fill="#7a8794">(high E, high Z)</text>
</svg>