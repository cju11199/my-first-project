<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 740 340" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="740" height="340" fill="white"/><text x="370" y="26" text-anchor="middle" font-size="17" font-weight="bold" fill="#0e3a4f">Image Match → 6-DOF Couch Correction</text><g transform="translate(0,10)"><text x="170" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e3a4f">1 · Match the images</text><ellipse cx="150" cy="150" rx="58" ry="74" fill="none" stroke="#d98a1f" stroke-width="2.5"/><circle cx="150" cy="150" r="12" fill="none" stroke="#d98a1f" stroke-width="2.5"/><g transform="rotate(7 196 168)"><ellipse cx="186" cy="166" rx="58" ry="74" fill="none" stroke="#1f7fa0" stroke-width="2.5"/><circle cx="186" cy="166" r="12" fill="none" stroke="#1f7fa0" stroke-width="2.5"/></g><text x="86" y="250" font-size="11.5" fill="#d98a1f">reference = orange (plan)</text><text x="86" y="267" font-size="11.5" fill="#1f7fa0">today = blue (CBCT)</text><path d="M250,150 q34,0 34,28" stroke="#0e3a4f" stroke-width="2" fill="none"/><polygon points="284,178 279,166 290,168" fill="#0e3a4f"/><text x="170" y="316" text-anchor="middle" font-size="12" fill="#7a8794">slide &amp; rotate blue → orange</text></g><line x1="350" y1="50" x2="350" y2="320" stroke="#dde6ec"/><g transform="translate(0,10)"><text x="500" y="60" text-anchor="middle" font-size="14" font-weight="bold" fill="#0e3a4f">2 · Couch correction (6 DOF)</text><text x="388" y="86" font-size="12" font-weight="bold" fill="#1f7fa0">Translations (slide)</text><line x1="396" y1="112" x2="424" y2="112" stroke="#1f7fa0" stroke-width="2"/><polygon points="424,112 417,108 417,116" fill="#1f7fa0"/><polygon points="396,112 403,108 403,116" fill="#1f7fa0"/><text x="437" y="117" font-size="12.5" font-weight="bold" fill="#1f7fa0">Lat</text><text x="487" y="117" font-size="12" fill="#1b2733">left ↔ right</text><line x1="396" y1="140" x2="424" y2="140" stroke="#1f7fa0" stroke-width="2"/><polygon points="424,140 417,136 417,144" fill="#1f7fa0"/><polygon points="396,140 403,136 403,144" fill="#1f7fa0"/><text x="437" y="145" font-size="12.5" font-weight="bold" fill="#1f7fa0">Long</text><text x="487" y="145" font-size="12" fill="#1b2733">head ↔ feet</text><line x1="396" y1="168" x2="424" y2="168" stroke="#1f7fa0" stroke-width="2"/><polygon points="424,168 417,164 417,172" fill="#1f7fa0"/><polygon points="396,168 403,164 403,172" fill="#1f7fa0"/><text x="437" y="173" font-size="12.5" font-weight="bold" fill="#1f7fa0">Vert</text><text x="487" y="173" font-size="12" fill="#1b2733">up ↕ down</text><text x="388" y="210" font-size="12" font-weight="bold" fill="#d98a1f">Rotations (tilt / twist)</text><path d="M398,242 A12 12 0 1 1 420,234" stroke="#d98a1f" stroke-width="2" fill="none"/><polygon points="420,234 414,228 424,227" fill="#d98a1f"/><text x="437" y="241" font-size="12.5" font-weight="bold" fill="#d98a1f">Pitch</text><text x="487" y="241" font-size="12" fill="#1b2733">nod — “yes”</text><path d="M398,270 A12 12 0 1 1 420,262" stroke="#d98a1f" stroke-width="2" fill="none"/><polygon points="420,262 414,256 424,255" fill="#d98a1f"/><text x="437" y="269" font-size="12.5" font-weight="bold" fill="#d98a1f">Roll</text><text x="487" y="269" font-size="12" fill="#1b2733">tilt head to shoulder</text><path d="M398,298 A12 12 0 1 1 420,290" stroke="#d98a1f" stroke-width="2" fill="none"/><polygon points="420,290 414,284 424,283" fill="#d98a1f"/><text x="437" y="297" font-size="12.5" font-weight="bold" fill="#d98a1f">Yaw</text><text x="487" y="297" font-size="12" fill="#1b2733">turn — “no”</text></g></svg>