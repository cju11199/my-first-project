<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 330" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="580" height="330" fill="white"/>
<text x="290" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0e3a4f">Electron Depth Dose</text>
<line x1="70" y1="270" x2="540" y2="270" stroke="#1b2733" stroke-width="1.5"/>
<line x1="70" y1="270" x2="70" y2="55" stroke="#1b2733" stroke-width="1.5"/>
<text x="305" y="305" text-anchor="middle" font-size="13" fill="#1b2733">Depth in tissue (cm) →</text>
<text x="40" y="165" text-anchor="middle" font-size="12" fill="#1b2733" transform="rotate(-90 40 165)">% dose →</text>
<!-- high surface dose, quick dmax, steep fall, brems tail -->
<path d="M70,110 C100,85 120,72 150,72 C185,72 215,120 250,180 C275,222 300,250 330,262 C370,276 440,276 540,276" stroke="#1f7fa0" stroke-width="3" fill="none"/>
<!-- dmax -->
<line x1="150" y1="72" x2="150" y2="270" stroke="#d98a1f" stroke-dasharray="4 3"/>
<text x="120" y="64" font-size="11" fill="#d98a1f">d_max (100%)</text>
<!-- R90 -->
<line x1="205" y1="100" x2="205" y2="270" stroke="#7a8794" stroke-dasharray="3 3"/>
<text x="196" y="92" font-size="10" fill="#7a8794">R₉₀</text>
<!-- R50 -->
<line x1="278" y1="172" x2="278" y2="270" stroke="#7a8794" stroke-dasharray="3 3"/>
<text x="270" y="166" font-size="10" fill="#7a8794">R₅₀</text>
<!-- Rp: extrapolate steep slope to axis -->
<line x1="250" y1="180" x2="360" y2="270" stroke="#c0392b" stroke-width="1.2" stroke-dasharray="5 4"/>
<text x="350" y="262" font-size="10" fill="#c0392b">R_p</text>
<text x="400" y="250" font-size="10" fill="#7a8794">bremsstrahlung tail</text>
<text x="80" y="100" font-size="10" fill="#1f7fa0">high surface dose</text>
</svg>