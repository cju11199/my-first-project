<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 300" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="580" height="300" fill="white"/>
<text x="290" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0e3a4f">Inverse-Square Law</text>
<circle cx="60" cy="160" r="9" fill="#d98a1f"/>
<text x="40" y="195" font-size="12" fill="#d98a1f">source</text>
<!-- diverging rays -->
<line x1="60" y1="160" x2="520" y2="60" stroke="#7a8794" stroke-width="1"/>
<line x1="60" y1="160" x2="520" y2="260" stroke="#7a8794" stroke-width="1"/>
<!-- squares at 1d, 2d, 3d -->
<rect x="180" y="135" width="50" height="50" fill="#1f7fa0" fill-opacity="0.30" stroke="#1f7fa0"/>
<rect x="320" y="110" width="100" height="100" fill="#1f7fa0" fill-opacity="0.18" stroke="#1f7fa0"/>
<rect x="455" y="85" width="65" height="150" fill="none"/>
<text x="205" y="210" text-anchor="middle" font-size="12" fill="#0e3a4f">1d</text>
<text x="370" y="232" text-anchor="middle" font-size="12" fill="#0e3a4f">2d</text>
<text x="180" y="125" font-size="11" fill="#0e3a4f">area ×1</text>
<text x="322" y="100" font-size="11" fill="#0e3a4f">area ×4</text>
<text x="180" y="270" font-size="13" fill="#1f7fa0">intensity 1</text>
<text x="322" y="270" font-size="13" fill="#1f7fa0">→ 1/4</text>
<text x="430" y="270" font-size="13" fill="#1f7fa0">→ 1/9 …</text>
<text x="300" y="293" text-anchor="middle" font-size="12" fill="#7a8794">Double the distance → one-quarter the dose rate.  D₂ = D₁ × (d₁/d₂)²</text>
</svg>