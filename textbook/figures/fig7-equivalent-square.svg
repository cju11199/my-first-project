<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 580 270" font-family="DejaVu Sans, Arial, sans-serif"><rect x="0" y="0" width="580" height="270" fill="white"/>
<text x="290" y="26" text-anchor="middle" font-size="16" font-weight="bold" fill="#0e3a4f">Equivalent Square of a Rectangle</text>
<rect x="70" y="70" width="150" height="90" fill="#1f7fa0" fill-opacity="0.18" stroke="#1f7fa0" stroke-width="2"/>
<text x="145" y="180" text-anchor="middle" font-size="12" fill="#0e3a4f">a = 10 cm</text>
<text x="56" y="118" text-anchor="middle" font-size="12" fill="#0e3a4f" transform="rotate(-90 56 118)">b = 6 cm</text>
<text x="250" y="120" font-size="26" fill="#7a8794">→</text>
<rect x="300" y="78" width="112" height="112" fill="#d98a1f" fill-opacity="0.18" stroke="#d98a1f" stroke-width="2"/>
<text x="356" y="208" text-anchor="middle" font-size="12" fill="#0e3a4f">7.5 cm × 7.5 cm</text>
<text x="290" y="248" text-anchor="middle" font-size="13" fill="#1b2733">Equivalent square = 2ab/(a+b) = 2(10)(6)/16 = 7.5 cm</text>
</svg>